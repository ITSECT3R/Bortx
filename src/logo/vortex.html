<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bortx — Vortex Logo Demo</title>
    <link rel="stylesheet" href="../borders/base.css" />
    <link rel="stylesheet" href="../borders/effects/rainbow.css" />
    <link rel="stylesheet" href="../borders/effects/index.css" />
    <link rel="stylesheet" href="../borders/modifiers/index.css" />
    <link rel="stylesheet" href="./vortex.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
        background: #080810;
        font-family: system-ui, sans-serif;
        color: #ccc;
        padding: 2rem;
      }

      .demo-section {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
      }

      .demo-variant {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .demo-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #555;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      .brand-name {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: 0.05em;
        background: linear-gradient(135deg, #ff5722, #ffb347);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .tagline {
        font-size: 0.85rem;
        color: #555;
        letter-spacing: 0.1em;
      }

      hr {
        width: 200px;
        border: none;
        border-top: 1px solid #1a1a2e;
      }
    </style>
  </head>
  <body>
    <div class="brand-row">
      <div
        class="vortex vortex-xl border-effect border-rainbow border-slow border-thick"
        style="--border-effect-radius: 9999px"
      >
        <div class="arm arm-1"></div>
        <div class="arm arm-2"></div>
        <div class="arm arm-3"></div>
        <div class="arm arm-4"></div>
        <div class="arm arm-5"></div>
        <div class="center"></div>
      </div>
      <div>
        <div class="brand-name">Bortx</div>
        <div class="tagline">CSS BORDER &amp; TEXT ANIMATIONS</div>
      </div>
    </div>

    <hr />

    <div class="demo-section">
      <div class="demo-variant">
        <div
          class="vortex vortex-sm border-effect border-rainbow border-slow"
          style="--border-effect-radius: 9999px"
        >
          <div class="arm arm-1"></div>
          <div class="arm arm-2"></div>
          <div class="arm arm-3"></div>
          <div class="arm arm-4"></div>
          <div class="arm arm-5"></div>
          <div class="center"></div>
        </div>
        <span class="demo-label">Sm</span>
      </div>

      <div class="demo-variant">
        <div
          class="vortex border-effect border-rainbow border-slow"
          style="--border-effect-radius: 9999px"
        >
          <div class="arm arm-1"></div>
          <div class="arm arm-2"></div>
          <div class="arm arm-3"></div>
          <div class="arm arm-4"></div>
          <div class="arm arm-5"></div>
          <div class="center"></div>
        </div>
        <span class="demo-label">Default</span>
      </div>

      <div class="demo-variant">
        <div
          class="vortex vortex-lg border-effect border-rainbow border-slow"
          style="--border-effect-radius: 9999px"
        >
          <div class="arm arm-1"></div>
          <div class="arm arm-2"></div>
          <div class="arm arm-3"></div>
          <div class="arm arm-4"></div>
          <div class="arm arm-5"></div>
          <div class="center"></div>
        </div>
        <span class="demo-label">Lg</span>
      </div>
    </div>

    <div class="demo-section">
      <div class="demo-variant">
        <div
          class="vortex vortex-cosmic border-effect border-rainbow border-slow"
          style="--border-effect-radius: 9999px"
        >
          <div class="arm arm-1"></div>
          <div class="arm arm-2"></div>
          <div class="arm arm-3"></div>
          <div class="arm arm-4"></div>
          <div class="arm arm-5"></div>
          <div class="center"></div>
        </div>
        <span class="demo-label">Cosmic</span>
      </div>
    </div>
  </body>
</html>
